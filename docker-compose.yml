version: "3.9"

services:
  api:
    build: .
    image: humanlike-ai-agent:latest
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/home/app/data
      - ./personalities:/home/app/personalities:ro
    depends_on:
      - redis
      - otel-collector
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./infra/otel/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"  # OTLP gRPC
      - "4318:4318"  # OTLP HTTP

volumes:
  redis-data:
